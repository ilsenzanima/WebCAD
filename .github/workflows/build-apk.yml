name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Pack APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder-project.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Installa componenti Android SDK mancanti
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME || echo "SDK root non trovato"
          # Accetta le licenze Android
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          # Installa platform e build-tools necessari
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" || true

      - name: Create dummy web assets directory for Capacitor
        run: |
          mkdir -p out
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>WebCAD</title></head><body><h1>WebCAD Loading...</h1></body></html>' > out/index.html

      - name: Sync Capacitor Native Files
        run: npx cap sync

      - name: Build Android APK (Gradle assembleDebug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug \
            -Pandroid.useAndroidX=true \
            --no-daemon \
            --stacktrace

      - name: Copy compiled APK to public downloads
        run: |
          mkdir -p public/downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk public/downloads/webcad-alpha.apk

      - name: Commit and Push compiled APK nel repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "build: compilato APK reale funzionante per download diretto dal sito"
          file_pattern: "public/downloads/webcad-alpha.apk"
          branch: main

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webcad-alpha-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
