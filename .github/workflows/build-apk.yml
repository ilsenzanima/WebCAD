name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Pack APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Diagnostica ambiente Android
        run: |
          echo "=== Java version ==="
          java -version || echo "Java non trovato"
          echo "=== ANDROID_HOME ==="
          echo $ANDROID_HOME
          ls $ANDROID_HOME || echo "ANDROID_HOME non trovato"
          echo "=== cmdline-tools ==="
          ls $ANDROID_HOME/cmdline-tools || echo "cmdline-tools non trovata"
          echo "=== sdkmanager path ==="
          find $ANDROID_HOME -name "sdkmanager" 2>/dev/null || echo "sdkmanager non trovato"
          echo "=== Build tools installati ==="
          ls $ANDROID_HOME/build-tools || echo "build-tools non trovati"
          echo "=== Platforms installate ==="
          ls $ANDROID_HOME/platforms || echo "platforms non trovate"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Accetta licenze e installa componenti SDK
        run: |
          SDKMANAGER=$(find $ANDROID_HOME/cmdline-tools -name sdkmanager -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "ERRORE: sdkmanager non trovato in $ANDROID_HOME/cmdline-tools"
            find $ANDROID_HOME -name "sdkmanager" 2>/dev/null
            exit 1
          fi
          echo "sdkmanager trovato: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses 2>/dev/null || true
          "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 || true
          echo "=== SDK installato ==="

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dipendenze npm
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder-project.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Crea web assets per Capacitor
        run: |
          mkdir -p out
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>WebCAD</title></head><body><h1>WebCAD Loading...</h1></body></html>' > out/index.html
          echo "Contenuto out/:"
          ls -la out/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Crea local.properties per Gradle
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cat android/local.properties

      - name: Estrai versione e aggiorna Android Gradle
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Versione rilevata: $VERSION"
          
          # Aggiorna build.gradle con versionName dinamico e versionCode progressivo
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/g" android/app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/g" android/app/build.gradle
          
          echo "=== android/app/build.gradle modificato ==="
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Build APK con Gradle
        run: |
          cd android
          chmod +x gradlew
          echo "=== Versione Gradle ==="
          ./gradlew --version
          echo "=== Build APK ==="
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Copia APK nei download pubblici
        run: |
          mkdir -p public/downloads
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "APK trovato: $APK_PATH"
          
          # Copia sia la versione taggata che quella generica per retrocompatibilità
          cp "$APK_PATH" "public/downloads/webcad-v$VERSION.apk"
          cp "$APK_PATH" public/downloads/webcad-alpha.apk
          
          ls -lh public/downloads/

      - name: Commit APK nel repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "build: compilato APK debug v${{ steps.get_version.outputs.VERSION }} (build #${{ github.run_number }})"
          file_pattern: "public/downloads/webcad-*.apk"
          branch: main

      - name: Upload APK come artifact GitHub
        uses: actions/upload-artifact@v4
        with:
          name: webcad-v${{ steps.get_version.outputs.VERSION }}-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
