name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Pack APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js Static Export
        run: npm run build
        env:
          # Disattiva il controllo di tipo rigoroso solo se necessario, ma Next build locale si compila con successo al 100%!
          NEXT_TELEMETRY_DISABLED: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Native Files
        run: npx cap sync

      - name: Build Android APK (Gradle assembleDebug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: webcad-alpha-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
