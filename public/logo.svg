<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Filtro bagliore (Glow) per la fiamma interna -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Sfondo profondo sfumato -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="70%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#030712" />
    </radialGradient>

    <!-- Gradiente per la fiamma principale -->
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="40%" stop-color="#ea580c" />
      <stop offset="85%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fef08a" />
    </linearGradient>

    <!-- Gradiente per il cuore della fiamma -->
    <linearGradient id="innerFireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0.9" />
    </linearGradient>

    <!-- Gradiente per il cubo CAD wireframe -->
    <linearGradient id="wireframeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>

  <!-- 1. Cerchio di sfondo -->
  <circle cx="256" cy="256" r="230" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="8" />

  <!-- 2. Griglia di precisione CAD (Sfondo tecnico) -->
  <!-- Cerchi concentrici di riferimento -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.15" />
  <circle cx="256" cy="256" r="130" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4,4" opacity="0.12" />
  <circle cx="256" cy="256" r="75" fill="none" stroke="#38bdf8" stroke-width="0.75" stroke-dasharray="2,2" opacity="0.1" />

  <!-- Assi principali cartesiani -->
  <line x1="50" y1="256" x2="462" y2="256" stroke="#38bdf8" stroke-width="1" opacity="0.15" />
  <line x1="256" y1="50" x2="256" y2="462" stroke="#38bdf8" stroke-width="1" opacity="0.15" />

  <!-- Assi Isometrici a 30 e 150 gradi -->
  <line x1="75" y1="151" x2="437" y2="361" stroke="#38bdf8" stroke-width="0.75" stroke-dasharray="3,3" opacity="0.15" />
  <line x1="75" y1="361" x2="437" y2="151" stroke="#38bdf8" stroke-width="0.75" stroke-dasharray="3,3" opacity="0.15" />

  <!-- Elementi di misura geometrici di sfondo (frecce e nodi) -->
  <circle cx="256" cy="75" r="4" fill="#38bdf8" opacity="0.4" />
  <circle cx="256" cy="437" r="4" fill="#38bdf8" opacity="0.4" />
  <circle cx="75" cy="256" r="4" fill="#38bdf8" opacity="0.4" />
  <circle cx="462" cy="256" r="4" fill="#38bdf8" opacity="0.4" />

  <!-- 3. Cubo CAD Wireframe 3D Isometrico (Proiezione tecnica) -->
  <!-- Linee posteriori del cubo (tratteggiate per mostrare la trasparenza 3D) -->
  <polygon points="152,312 256,260 360,312" fill="none" stroke="url(#wireframeGrad)" stroke-width="2" stroke-dasharray="4,4" opacity="0.4" />
  <line x1="256" y1="140" x2="256" y2="260" stroke="url(#wireframeGrad)" stroke-width="2" stroke-dasharray="4,4" opacity="0.4" />

  <!-- 4. La FIAMMA INTERNA (Elemento Antincendio Centrale) -->
  <!-- Riflesso e alone luminoso dietro la fiamma -->
  <ellipse cx="256" cy="265" rx="55" ry="75" fill="#ea580c" opacity="0.25" filter="url(#glow)" />

  <!-- Fiamma Esterna Incandescente -->
  <path d="M256,310 
           C290,310 310,290 310,260 
           C310,225 285,205 285,170 
           C285,170 270,195 256,200 
           C242,195 227,170 227,170 
           C227,205 202,225 202,260 
           C202,290 222,310 256,310 Z" 
        fill="url(#fireGrad)" 
        filter="url(#glow)" />

  <!-- Cuore della Fiamma (Interno luminoso) -->
  <path d="M256,300 
           C278,300 292,285 292,263 
           C292,238 275,223 275,195 
           C275,195 265,213 256,217 
           C247,213 237,195 237,195 
           C237,223 220,238 220,263 
           C220,285 234,300 256,300 Z" 
        fill="url(#innerFireGrad)" />

  <!-- 5. Linee anteriori principali del Cubo (Wireframe solido) -->
  <!-- Faccia superiore -->
  <polygon points="256,140 360,200 256,260 152,200" fill="none" stroke="url(#wireframeGrad)" stroke-width="4.5" stroke-linejoin="round" />
  
  <!-- Spigoli verticali anteriori -->
  <line x1="152" y1="200" x2="152" y2="312" stroke="url(#wireframeGrad)" stroke-width="4.5" stroke-linecap="round" />
  <line x1="360" y1="200" x2="360" y2="312" stroke="url(#wireframeGrad)" stroke-width="4.5" stroke-linecap="round" />
  <line x1="256" y1="260" x2="256" y2="372" stroke="url(#wireframeGrad)" stroke-width="5" stroke-linecap="round" />

  <!-- Faccia inferiore (bordi anteriori) -->
  <path d="M152,312 L256,372 L360,312" fill="none" stroke="url(#wireframeGrad)" stroke-width="4.5" stroke-linejoin="round" />

  <!-- Piccoli punti/nodi di ancoraggio tipici del disegno CAD 3D -->
  <circle cx="256" cy="140" r="5" fill="#ffffff" stroke="#0284c7" stroke-width="1.5" />
  <circle cx="360" cy="200" r="5" fill="#ffffff" stroke="#0284c7" stroke-width="1.5" />
  <circle cx="152" cy="200" r="5" fill="#ffffff" stroke="#0284c7" stroke-width="1.5" />
  <circle cx="256" cy="260" r="5" fill="#ffffff" stroke="#0284c7" stroke-width="1.5" />
  <circle cx="152" cy="312" r="5" fill="#ffffff" stroke="#0284c7" stroke-width="1.5" />
  <circle cx="360" cy="312" r="5" fill="#ffffff" stroke="#0284c7" stroke-width="1.5" />
  <circle cx="256" cy="372" r="6" fill="#ffffff" stroke="#0284c7" stroke-width="2" />
</svg>
